<!DOCTYPE html>
<html>
<head>
    <title>LMS Dashboard</title>
</head>
<body>

<h1>LMS Dashboard</h1>

<button onclick="logout()">Выйти</button>

<div id="content"></div>

<div id="tests"></div>

<div id="assignments"></div>

<script>

const role = localStorage.getItem("role");

const content = document.getElementById("content");

if(role === "ADMIN"){
    content.innerHTML = `
        <h2>Администратор</h2>
        <button>Пользователи</button>
    `;
}

if(role === "MANAGER"){
    content.innerHTML = `
        <h2>Менеджер</h2>
        <button>Тесты</button>
        <button>Задания</button>
        <button>Статистика</button>
    `;
}

if(role === "STUDENT"){

    content.innerHTML = `
        <h2>Студент</h2>
    `;

    loadStudentData();
}

async function loadStudentData() {

    const token =
        localStorage.getItem("token");

    const testsResponse =
        await fetch(
            "http://localhost:8080/api/tests",
            {
                headers: {
                    "Authorization":
                        "Bearer " + token
                }
            }
        );

    const tests =
        await testsResponse.json();

    document.getElementById("tests").innerHTML =
        "<h3>Тесты</h3>" +
        tests.map(test =>
            `<button onclick="openTest(${test.id})">
                ${test.title}
            </button><br><br>`
        ).join("");

    const assignmentsResponse =
        await fetch(
            "http://localhost:8080/api/assignments",
            {
                headers: {
                    "Authorization":
                        "Bearer " + token
                }
            }
        );

    const assignments =
        await assignmentsResponse.json();

    document.getElementById("assignments").innerHTML =
        "<h3>Задания</h3>" +
        assignments.map(assignment =>
            `<p>${assignment.title}</p>`
        ).join("");
}

async function openTest(testId) {

    const token =
        localStorage.getItem("token");

    const response =
        await fetch(
            `http://localhost:8080/api/tests/${testId}`,
            {
                headers: {
                    "Authorization":
                        "Bearer " + token
                }
            }
        );

    const test =
        await response.json();

    let html =
        `<h2>${test.title}</h2>`;

    test.questions.forEach(question => {

        html += `
            <h3>${question.questionText}</h3>
        `;

        question.answers.forEach(answer => {

            html += `
                <label>
                    <input
                        type="radio"
                        name="question_${question.id}"
                        value="${answer.id}">
                    ${answer.label}. ${answer.answerText}
                </label>
                <br>
            `;
        });

        html += `<br>`;
    });

    html += `
        <button onclick="submitTest(${testId})">
            Сдать тест
        </button>
    `;

    document.getElementById("tests")
        .innerHTML = html;
}

async function submitTest(testId) {

    const token =
        localStorage.getItem("token");

    const response =
        await fetch(
            `http://localhost:8080/api/tests/${testId}`,
            {
                headers: {
                    "Authorization":
                        "Bearer " + token
                }
            }
        );

    const test =
        await response.json();

    const answers = [];

    test.questions.forEach(question => {

        const selected =
            document.querySelector(
                `input[name="question_${question.id}"]:checked`
            );

        if(selected){

            answers.push({
                questionId: question.id,
                selectedAnswerId:
                    Number(selected.value)
            });
        }
    });

    const submitResponse =
        await fetch(
            `http://localhost:8080/api/tests/${testId}/submit`,
            {
                method: "POST",
                headers: {
                    "Content-Type":
                        "application/json",
                    "Authorization":
                        "Bearer " + token
                },
                body: JSON.stringify({
                    answers: answers
                })
            }
        );

    const result =
        await submitResponse.json();

    document.getElementById("tests")
        .innerHTML = `
            <h2>Результат теста</h2>

            <p>
                Балл:
                ${result.score}
                /
                ${result.totalPoints}
            </p>

            <p>
                Неправильных ответов:
                ${result.incorrectCount}
            </p>
        `;
}

function logout() {

    localStorage.clear();

    window.location.href =
        "login.html";
}

</script>

</body>
</html>
