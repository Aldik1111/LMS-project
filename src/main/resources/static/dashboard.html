<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>LMS</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="topbar">
    <h1>LMS</h1>
    <div class="topbar-right">
        <span id="userInfo"></span>
        <button class="secondary" onclick="logout()">Выйти</button>
    </div>
</div>

<div class="container" id="content"></div>

<script src="api.js"></script>
<script>
    requireAuth();

    const role = getRole();
    const name = getFullName();
    const displayName = (name && name !== 'undefined' && name !== 'null') ? name : '';
    document.getElementById("userInfo").textContent = displayName ? `${displayName} · ${role}` : role;

    const content = document.getElementById("content");

    if (role === "ADMIN") {
        content.innerHTML = `
        <div class="card">
            <h2>Администратор</h2>
            <p class="muted">Управление пользователями и ролями.</p>
            <button onclick="location.href='admin.html'">Открыть пользователей</button>
        </div>`;
    }

    if (role === "MANAGER") {
        content.innerHTML = `
        <div class="card">
            <h2>Менеджер</h2>
            <p class="muted">Создание тестов, заданий и просмотр результатов.</p>
            <button onclick="location.href='manager.html'">Открыть панель менеджера</button>
        </div>`;
    }

    if (role === "STUDENT") {
        content.innerHTML = `
        <div class="card">
            <h2>Мои задания</h2>
            <div id="assignments" class="empty-state">Загрузка…</div>
        </div>
        <div id="testArea"></div>`;
        loadStudentData();
    }

    async function loadStudentData() {
        try {
            const assignments = await apiGet("/assignments");
            const box = document.getElementById("assignments");

            if (assignments.length === 0) { box.className = "empty-state"; box.textContent = "Заданий пока нет"; return; }

            box.className = "";
            box.innerHTML = assignments.map(a => `
            <div class="row">
                <div>
                    <div><b>${escapeHtml(a.title)}</b></div>
                    <div class="muted">${escapeHtml(a.description || "")}</div>
                    <div class="muted">Тест: ${escapeHtml(a.testTitle || "-")} · Срок: ${formatDate(a.deadline)}</div>
                </div>
                <div>
                    ${a.status === "COMPLETED"
                        ? `<span class="badge success">Выполнено</span>`
                        : a.testId
                            ? `<button onclick="openTest(${a.testId}, ${a.id})">Пройти тест</button>`
                            : `<button onclick="completeAssignment(${a.id})">Отметить выполненным</button>`}
                </div>
            </div>`).join("");
                } catch (err) {
            document.getElementById("assignments").textContent = "Ошибка: " + err.message;
        }
    }

    async function completeAssignment(id) {
        await apiPut(`/assignments/${id}/complete`);
        loadStudentData();
    }

    async function openTest(testId, assignmentId) {
        const test = await apiGet(`/tests/${testId}`);
        window.currentTest = test;

        let html = `<div class="card"><h2>${escapeHtml(test.title)}</h2>`;

        test.questions.forEach(q => {
            html += `<div class="question-block"><p><b>${escapeHtml(q.questionText)}</b></p>`;
            q.answers.forEach(a => {
                html += `
                <label class="answer-row">
                    <input type="radio" name="q_${q.id}" value="${a.id}">
                    <span>${a.label}. ${escapeHtml(a.answerText)}</span>
                </label>`;
            });
            html += `</div>`;
        });

        html += `<button onclick="submitTest(${testId}, ${assignmentId})">Сдать тест</button></div>`;

        document.getElementById("testArea").innerHTML = html;
        document.getElementById("assignments").parentElement.scrollIntoView({ behavior: "smooth" });
    }

    async function submitTest(testId, assignmentId) {
        const test = window.currentTest;
        const answers = [];

        for (const q of test.questions) {
            const selected = document.querySelector(`input[name="q_${q.id}"]:checked`);
            if (!selected) { alert("Ответьте на все вопросы"); return; }
            answers.push({ questionId: q.id, selectedAnswerId: Number(selected.value) });
        }

        const result = await apiPost(`/tests/${testId}/submit`, { answers });
        if (!result.ok) { alert("Ошибка отправки теста: " + result.text); return; }

        const r = result.data;

        let html = `
        <div class="card">
            <h2>Результат: ${escapeHtml(r.testTitle)}</h2>
            <p>Правильных ответов: <b>${r.score} / ${r.totalPoints}</b> · Неправильных: ${r.incorrectCount}</p>`;

        r.details.forEach(d => {
            html += `
            <div class="row">
                <div>
                    <div>${escapeHtml(d.questionText)}</div>
                    <div class="muted">Ваш ответ: ${escapeHtml(d.selectedAnswer)}${!d.correct ? " · Верно: " + escapeHtml(d.correctAnswer) : ""}</div>
                </div>
                <span class="badge ${d.correct ? "success" : "danger"}">${d.correct ? "Верно" : "Неверно"}</span>
            </div>`;
        });

        html += `<button onclick="finishTest()" style="margin-top:12px;">Готово</button></div>`;
        document.getElementById("testArea").innerHTML = html;

        if (assignmentId) await apiPut(`/assignments/${assignmentId}/complete`);
    }

    function finishTest() {
        document.getElementById("testArea").innerHTML = "";
        loadStudentData();
    }
</script>
</body>
</html>
