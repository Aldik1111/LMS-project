<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>LMS — Вход</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
<div class="login-page">
    <div class="login-card">
        <h1>LMS</h1>
        <p class="muted">Войдите в свой аккаунт</p>
        <input type="email" id="email" placeholder="Email" autocomplete="email">
        <input type="password" id="password" placeholder="Пароль" autocomplete="current-password">
        <button onclick="handleLogin()">Войти</button>
        <div id="error" class="error-text"></div>
    </div>
</div>

<script src="api.js"></script>
<script>
    if (getToken()) window.location.href = "dashboard.html";

    async function handleLogin() {
        const email = document.getElementById("email").value.trim();
        const password = document.getElementById("password").value;
        const errorEl = document.getElementById("error");
        errorEl.textContent = "";

        if (!email || !password) { errorEl.textContent = "Заполните все поля"; return; }

        try {
            await login(email, password);
            window.location.href = "dashboard.html";
        } catch (err) {
            errorEl.textContent = "Неверный email или пароль";
        }
    }

    document.addEventListener("keydown", e => { if (e.key === "Enter") handleLogin(); });
</script>
</body>
</html>
