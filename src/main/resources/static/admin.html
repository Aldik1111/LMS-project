<!DOCTYPE html>

<head>
    <meta charset="UTF-8">
    <title>Admin Panel</title>

    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 30px;
            background: #f5f5f5;
        }

        .header {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
        }

        .card {
            background: white;
            padding: 20px;
            border-radius: 10px;
            margin-bottom: 20px;
            box-shadow: 0 0 10px rgba(0,0,0,.1);
        }

        input, select {
            padding: 10px;
            margin: 5px;
        }

        button {
            padding: 10px 15px;
            cursor: pointer;
        }

        .user {
            padding: 10px;
            margin-top: 5px;
            border-bottom: 1px solid #ddd;
        }
    </style>

</head>

<body>

<div class="header">

</div>

<h1>Админ панель</h1>

<div class="card">

    <h2>Создать пользователя</h2>

    <input
        id="email"
        placeholder="Email">

    <input
        id="password"
        placeholder="Пароль">

    <select id="role">
        <option>ADMIN</option>
        <option>MANAGER</option>
        <option>STUDENT</option>
    </select>

    <button onclick="createUser()">
        Создать пользователя
    </button>

</div>

<div class="card">

    <h2>Пользователи</h2>

    const token = localStorage.getItem("token");

    if (!token || role !== "ADMIN") {
        window.location.href = "login.html";
    } else {
        loadUsers();
    }
