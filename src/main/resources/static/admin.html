<!DOCTYPE html>
<html>
<head>
    <title>Admin Panel</title>

    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 30px;
            background: #f5f5f5;
        }

        .header {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
        }

        .card {
            background: white;
            padding: 20px;
            border-radius: 10px;
            margin-bottom: 20px;
            box-shadow: 0 0 10px rgba(0,0,0,.1);
        }

        input, select {
            padding: 10px;
            margin: 5px;
        }

        button {
            padding: 10px 15px;
            cursor: pointer;
        }

        .user {
            padding: 10px;
            margin-top: 5px;
            border-bottom: 1px solid #ddd;
        }
    </style>

</head>

<body>

<div class="header">
    <button onclick="goBack()">
        ← Dashboard
    </button>

    <button onclick="logout()">
        Выйти
    </button>
</div>

<h1>Админ панель</h1>

<div class="card">

    <h2>Создать пользователя</h2>

    <input
        id="email"
        placeholder="Email">

    <input
        id="password"
        placeholder="Пароль">

    <select id="role">
        <option>ADMIN</option>
        <option>MANAGER</option>
        <option>STUDENT</option>
    </select>

    <button onclick="createUser()">
        Создать пользователя
    </button>

</div>

<div class="card">

    <h2>Пользователи</h2>

    <div id="users">
        Загрузка...
    </div>

</div>

<script>

const token = localStorage.getItem("token");

loadUsers();

async function loadUsers() {

    try {

        const response = await fetch(
            "http://localhost:8080/api/users",
            {
                headers: {
                    "Authorization": "Bearer " + token
                }
            }
        );

        const users = await response.json();

        document.getElementById("users").innerHTML =
            users.map(user => `
                <div class="user">
                    <b>${user.fullName || user.fullname || "Без имени"}</b>
                    (${user.email})
                    - ${user.role}
                </div>
            `).join("");

    } catch(error) {

        console.error(error);

        document.getElementById("users").innerHTML =
            "Ошибка загрузки пользователей";
    }
}

async function createUser() {

    const email =
        document.getElementById("email").value;

    const password =
        document.getElementById("password").value;

    const role =
        document.getElementById("role").value;

    if(!email || !password){
        alert("Заполните все поля");
        return;
    }

    try {

        const response = await fetch(
            "http://localhost:8080/api/users",
            {
                method: "POST",
                headers: {
                    "Content-Type": "application/json",
                    "Authorization": "Bearer " + token
                },
                body: JSON.stringify({
                    email: email,
                    password: password,
                    role: role,
                    fullName: email
                })
            }
        );

        console.log("STATUS:", response.status);

        const text = await response.text();

        console.log("RESPONSE:", text);

        if(response.ok){

            alert("Пользователь создан");

            document.getElementById("email").value = "";
            document.getElementById("password").value = "";

            loadUsers();

        } else {

            alert(
                "Ошибка создания пользователя\n\n" +
                "Status: " + response.status +
                "\n\n" +
                text
            );
        }

    } catch(error) {

        console.error(error);

        alert("Не удалось подключиться к серверу");
    }
}

function goBack() {
    window.location.href = "dashboard.html";
}

function logout() {

    localStorage.clear();

    window.location.href = "login.html";
}

</script>

</body>
</html>
