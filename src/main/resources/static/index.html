<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>LMS Login</title>

    <style>
        body {
            font-family: Arial, sans-serif;
            background: #f4f4f4;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }

        .login-box {
            background: white;
            padding: 30px;
            border-radius: 10px;
            width: 320px;
            box-shadow: 0 0 10px rgba(0,0,0,0.2);
        }

        h1 {
            text-align: center;
        }

        input {
            width: 100%;
            padding: 10px;
            margin-top: 10px;
            box-sizing: border-box;
        }

        button {
            width: 100%;
            padding: 10px;
            margin-top: 15px;
            cursor: pointer;
        }
    </style>

</head>

<body>

<div class="login-box">

    <h1>LMS Login</h1>

    <input
            type="email"
            id="email"
            placeholder="Email">

    <input
            type="password"
            id="password"
            placeholder="Password">

    <button onclick="login()">
        Login
    </button>

</div>

<script src="api.js"></script>

</body>
</html>
