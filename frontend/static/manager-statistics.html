<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Manager - Statistics</title>
    <style>
        :root{--bg:#fafbff;--card:#ffffff;--accent:#0f172a;--muted:#6b7280}
        body{background:var(--bg);font-family:Inter,system-ui,Arial;padding:24px}
        .container{max-width:1100px;margin:0 auto}
        .card{background:var(--card);padding:16px;border-radius:12px;box-shadow:0 6px 18px rgba(16,24,40,0.06)}
        table{width:100%;border-collapse:collapse;margin-top:12px}
        th,td{padding:10px;text-align:left;border-bottom:1px solid #f0f4ff}
        th{background:#fbfdff;font-weight:600}
        .muted{color:var(--muted)}
    </style>
</head>
<body>
<div class="container">
    <header style="display:flex;align-items:center;justify-content:space-between;margin-bottom:12px">
        <h1>Статистика — Общая</h1>
        <div>
            <button onclick="window.location.href='dashboard.html'">Назад</button>
        </div>
    </header>

    <div class="card">
        <div id="summary" class="muted">Загрузка...</div>
        <div id="tableWrap"></div>
    </div>
</div>

<script>
    const token = localStorage.getItem('token');

    async function loadStats(){
        const r = await fetch('/api/statistics/overall',{headers:{'Authorization':'Bearer '+token}});
        if(!r.ok){document.getElementById('summary').innerText='Ошибка: '+r.status;return;}
        const data = await r.json();
        render(data);
    }

    function render(data){
        document.getElementById('summary').innerHTML = `<strong>Всего записей:</strong> ${data.length || 0}`;
        const table = document.createElement('table');
        const thead = document.createElement('thead'); thead.innerHTML = '<tr><th>Студент</th><th>Тест</th><th>Баллы</th><th>Правильных</th><th>Неправильных</th><th>Дата</th></tr>';
        table.appendChild(thead);
        const tbody = document.createElement('tbody');
        (data||[]).forEach(row=>{
            const tr = document.createElement('tr');
            tr.innerHTML = `
                <td>${escapeHtml(row.studentName||row.studentId||'—')}</td>
                <td>${escapeHtml(row.testTitle||'—')}</td>
                <td>${row.score||0}/${row.totalPoints||0}</td>
                <td>${row.correctCount||0}</td>
                <td>${row.incorrectCount||0}</td>
                <td>${row.date?escapeHtml(new Date(row.date).toLocaleString()):'—'}</td>
            `;
            tbody.appendChild(tr);
        });
        table.appendChild(tbody);
        const wrap = document.getElementById('tableWrap'); wrap.innerHTML=''; wrap.appendChild(table);
    }

    function escapeHtml(s){return String(s||'').replaceAll('&','&amp;').replaceAll('<','&lt;').replaceAll('>','&gt;');}

    loadStats();
</script>
</body>
</html>
