<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LMS</title>
    <link rel="stylesheet" href="style.css">

    <style>
        /* ===== Student layout ===== */
        #studentLayout { display: none; height: 100vh; font-family: var(--font-body); background: var(--bg); overflow: hidden; }
        #studentLayout.visible { display: flex; }

        .st-sidebar {
            width: 240px; min-width: 240px;
            background: var(--surface);
            border-right: 1px solid var(--border);
            display: flex; flex-direction: column;
        }

        .st-logo { display: flex; align-items: center; gap: 10px; padding: 22px 20px; border-bottom: 1px solid var(--border); }
        .st-logo-mark {
            width: 36px; height: 36px; border-radius: 10px;
            background: var(--accent);
            color: #fff;
            display: flex; align-items: center; justify-content: center;
            font-weight: 800;
        }

        .st-nav { flex: 1; padding: 12px; }
        .st-nav-btn {
            width: 100%;
            padding: 10px;
            border: none;
            background: none;
            text-align: left;
            color: var(--text-muted);
            border-radius: 8px;
            cursor: pointer;
        }
        .st-nav-btn.active { background: var(--accent-soft); color: var(--accent); }

        .st-main { flex: 1; display: flex; flex-direction: column; overflow: hidden; }

        .st-header {
            padding: 14px 24px;
            display: flex; justify-content: space-between;
            border-bottom: 1px solid var(--border);
        }

        .st-content { padding: 24px; overflow-y: auto; }

        .st-list { background: var(--surface); border: 1px solid var(--border); border-radius: 10px; overflow: hidden; }

        .st-list-row {
            display: flex;
            justify-content: space-between;
            padding: 14px 18px;
            border-bottom: 1px solid var(--border);
        }

        .st-list-row:last-child { border-bottom: none; }

        .st-row-title { font-weight: 600; }
        .st-row-sub { font-size: 12px; color: var(--text-muted); }

        .st-action-btn {
            padding: 6px 14px;
            background: var(--accent);
            color: #fff;
            border: none;
            border-radius: 6px;
            cursor: pointer;
        }

        .st-badge-done {
            font-size: 12px;
            color: var(--success);
        }

        /* overlay */
        #testOverlay {
            position: fixed;
            inset: 0;
            display: none;
            background: rgba(0,0,0,0.6);
            align-items: center;
            justify-content: center;
        }

        #testOverlay.open { display: flex; }

        .st-test-card {
            background: var(--surface);
            padding: 24px;
            border-radius: 12px;
            width: 600px;
            max-height: 90vh;
            overflow-y: auto;
        }

        .st-answer-label {
            display: block;
            margin: 6px 0;
        }
    </style>
</head>

<body>

<!-- SIMPLE (ADMIN / MANAGER) -->
<div id="simpleLayout" style="display:none">
    <div class="topbar">
        <h1>LMS</h1>
        <button onclick="logout()">Выйти</button>
    </div>
    <div id="simpleContent"></div>
</div>

<!-- STUDENT -->
<div id="studentLayout">
    <aside class="st-sidebar">
        <div class="st-logo">
            <div class="st-logo-mark">L</div>
            LMS
        </div>

        <nav class="st-nav">
            <button class="st-nav-btn active">Мои задания</button>
        </nav>

        <div style="padding:12px">
            <div id="stName">Студент</div>
        </div>
    </aside>

    <main class="st-main">
        <div class="st-header">
            <div>Задания</div>
        </div>

        <div class="st-content">
            <div id="stList"></div>
        </div>
    </main>
</div>

<!-- TEST -->
<div id="testOverlay">
    <div class="st-test-card" id="testCard"></div>
</div>

<script src="api.js"></script>

<script>
    requireAuth();

    const role = getRole();
    const name = getFullName() || 'Студент';

    document.getElementById('stName').innerText = name;

    let allAssignments = [];
    let currentTest = null;

    if (role === 'STUDENT') {
        document.getElementById('studentLayout').classList.add('visible');
        initStudent();
    } else {
        document.getElementById('simpleLayout').style.display = 'block';
        document.getElementById('simpleContent').innerHTML =
            `<h2>${role}</h2>`;
    }

    /* ================= STUDENT ================= */

    async function initStudent() {
        allAssignments = await apiGet('/assignments');
        renderList();
    }

    function renderList() {
        const list = document.getElementById('stList');

        if (!allAssignments.length) {
            list.innerHTML = `<p>Нет заданий</p>`;
            return;
        }

        list.innerHTML = `
        <div class="st-list">
            ${allAssignments.map(a => `
                <div class="st-list-row">
                    <div>
                        <div class="st-row-title">${escapeHtml(a.title)}</div>
                        <div class="st-row-sub">
                            ${escapeHtml(a.description || '')}
                            · ${formatDate(a.deadline)}
                        </div>
                    </div>

                    <div>
                        ${a.completed
            ? `<span class="st-badge-done">✔ выполнено</span>`
            : a.expired
                ? `<span style="color:red">истёк срок</span>`
                : a.testId
                    ? `<button class="st-action-btn" onclick="openTest(${a.testId})">Пройти</button>`
                    : `<span>нет теста</span>`
        }
                    </div>
                </div>
            `).join('')}
        </div>
    `;
    }

    /* ================= TEST ================= */

    async function openTest(testId) {
        const res = await apiGet(`/tests/${testId}`);
        currentTest = res;

        let html = `<h2>${escapeHtml(res.title)}</h2>`;

        res.questions.forEach(q => {
            html += `<div>
            <p><b>${escapeHtml(q.questionText)}</b></p>`;

            q.answers.forEach(a => {
                html += `
                <label class="st-answer-label">
                    <input type="radio" name="q_${q.id}" value="${a.id}">
                    ${escapeHtml(a.answerText)}
                </label>`;
            });

            html += `</div>`;
        });

        html += `<button onclick="submitTest(${testId})">Сдать</button>`;

        document.getElementById('testCard').innerHTML = html;
        document.getElementById('testOverlay').classList.add('open');
    }

    function closeTest() {
        document.getElementById('testOverlay').classList.remove('open');
    }

    async function submitTest(testId) {
        const answers = [];

        for (const q of currentTest.questions) {
            const sel = document.querySelector(`input[name="q_${q.id}"]:checked`);
            if (!sel) return alert('Ответьте на все вопросы');

            answers.push({
                questionId: q.id,
                selectedAnswerId: Number(sel.value)
            });
        }

        const result = await apiPost(`/tests/${testId}/submit`, { answers });

        if (!result.ok) {
            alert(result.data || "Ошибка");
            return;
        }

        const r = result.data;

        document.getElementById('testCard').innerHTML = `
        <h2>Результат</h2>
        <p>${r.score}/${r.totalPoints}</p>
        <button onclick="finishTest()">Закрыть</button>
    `;
    }

    async function finishTest() {
        closeTest();
        allAssignments = await apiGet('/assignments');
        renderList();
    }
</script>

</body>
</html>
