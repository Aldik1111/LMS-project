<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>LMS — Пользователи</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="topbar">
    <h1>Пользователи</h1>
    <div class="topbar-right">
        <button class="secondary" onclick="location.href='dashboard.html'">← Назад</button>
        <button class="secondary" onclick="logout()">Выйти</button>
    </div>
</div>

<div class="container">

    <div class="card">
        <h2>Новый пользователь</h2>
        <input type="email" id="newEmail" placeholder="Email">
        <input type="password" id="newPassword" placeholder="Пароль">
        <input type="text" id="newFullName" placeholder="Имя и фамилия">
        <select id="newRole">
            <option value="STUDENT">Студент</option>
            <option value="MANAGER">Менеджер</option>
            <option value="ADMIN">Администратор</option>
        </select>
        <button onclick="createUser()">Создать</button>
        <div id="createError" class="error-text"></div>
    </div>

    <div class="card">
        <h2>Все пользователи</h2>
        <table>
            <thead><tr><th>Имя</th><th>Email</th><th>Роль</th><th>Статус</th><th></th></tr></thead>
            <tbody id="usersBody"></tbody>
        </table>
    </div>

</div>

<script src="api.js"></script>
<script>
    requireAuth("ADMIN");
    loadUsers();

    function roleLabel(role) {
        return { ADMIN: "Администратор", MANAGER: "Менеджер", STUDENT: "Студент" }[role] || role;
    }

    async function loadUsers() {
        try {
            const users = await apiGet("/users");
            document.getElementById("usersBody").innerHTML = users.map(u => `
            <tr>
                <td>${escapeHtml(u.fullName) || "—"}</td>
                <td>${escapeHtml(u.email)}</td>
                <td>${roleLabel(u.role)}</td>
                <td>${u.active ? '<span class="badge success">Активен</span>' : '<span class="badge pending">Отключён</span>'}</td>
                <td><button class="danger" onclick="deleteUser(${u.id})">Удалить</button></td>
            </tr>`).join("");
        } catch (err) {
            document.getElementById("usersBody").innerHTML = `<tr><td colspan="5">Ошибка: ${err.message}</td></tr>`;
        }
    }

    async function createUser() {
        const email = document.getElementById("newEmail").value.trim();
        const password = document.getElementById("newPassword").value;
        const fullName = document.getElementById("newFullName").value.trim();
        const role = document.getElementById("newRole").value;
        const errorEl = document.getElementById("createError");
        errorEl.textContent = "";

        if (!email || !password || !fullName) { errorEl.textContent = "Заполните все поля"; return; }

        const result = await apiPost("/users", { email, password, fullName, role, active: true });

        if (!result.ok) {
            errorEl.textContent = result.status === 400 ? "Email уже используется" : "Ошибка: " + result.text;
            return;
        }

        document.getElementById("newEmail").value = "";
        document.getElementById("newPassword").value = "";
        document.getElementById("newFullName").value = "";
        loadUsers();
    }

    async function deleteUser(id) {
        if (!confirm("Удалить пользователя?")) return;
        const result = await apiDelete(`/users/${id}`);
        if (!result.ok) { alert("Не удалось удалить пользователя"); return; }
        loadUsers();
    }
</script>
</body>
</html>
