<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>LMS — Менеджер</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="topbar">
    <h1>Панель менеджера</h1>
    <div class="topbar-right">
        <span id="userInfo"></span>
        <button class="secondary" onclick="location.href='dashboard.html'">← Назад</button>
        <button class="secondary" onclick="logout()">Выйти</button>
    </div>
</div>

<div class="container">

    <div class="card">
        <h2>Новый тест</h2>
        <input type="text" id="testTitle" placeholder="Название теста">
        <input type="text" id="testDescription" placeholder="Описание (необязательно)">
        <div id="questions"></div>
        <div class="btn-group">
            <button class="secondary" onclick="addQuestion()">+ Вопрос</button>
            <button onclick="createTest()">Сохранить тест</button>
        </div>
        <div id="testError" class="error-text"></div>
    </div>

    <div class="card">
        <h2>Тесты</h2>
        <div id="testsList" class="empty-state">Загрузка…</div>
    </div>

    <div class="card">
        <h2>Новое задание</h2>
        <input type="text" id="assignTitle" placeholder="Название задания">
        <input type="text" id="assignDescription" placeholder="Описание (необязательно)">
        <select id="assignStudent"><option value="">Загрузка студентов…</option></select>
        <select id="assignTest"><option value="">Без теста</option></select>
        <input type="datetime-local" id="assignDeadline">
        <button class="full" onclick="createAssignment()">Создать задание</button>
        <div id="assignError" class="error-text"></div>
    </div>

    <div class="card">
        <h2>Задания</h2>
        <div id="assignmentsList" class="empty-state">Загрузка…</div>
    </div>

    <div class="card">
        <h2>Результаты теста</h2>
        <select id="statsTest" onchange="loadStatistics()"><option value="">Выберите тест</option></select>
        <div id="statsResult"></div>
    </div>

</div>

<script src="api.js"></script>
<script>
    requireAuth("MANAGER");

    const _name = getFullName();
    const _displayName = (_name && _name !== 'undefined' && _name !== 'null') ? _name : '';
    document.getElementById("userInfo").textContent = _displayName ? `${_displayName} · Менеджер` : 'Менеджер';

    let questionCount = 0;

    addQuestion();
    loadTests();
    loadAssignments();
    loadFormOptions();

    // ===== СОЗДАНИЕ ТЕСТА =====

    function addQuestion() {
        questionCount++;
        const index = questionCount;

        const div = document.createElement("div");
        div.className = "question-block";
        div.id = `question_${index}`;
        div.innerHTML = `
        <div class="row" style="border-bottom:none; padding-top:0;">
            <b>Вопрос ${index}</b>
            <button class="danger" onclick="removeQuestion(${index})">Удалить</button>
        </div>
        <input type="text" placeholder="Текст вопроса" class="q-text">
        ${["A","B","C","D"].map(label => `
            <label class="answer-row">
                <input type="radio" name="correct_${index}" value="${label}">
                <span>${label}</span>
                <input type="text" placeholder="Вариант ${label}" class="a-text" data-label="${label}">
            </label>`).join("")}
    `;

        document.getElementById("questions").appendChild(div);
    }

    function removeQuestion(index) {
        document.getElementById(`question_${index}`)?.remove();
    }

    async function createTest() {
        const title = document.getElementById("testTitle").value.trim();
        const description = document.getElementById("testDescription").value.trim();
        const errorEl = document.getElementById("testError");
        errorEl.textContent = "";

        if (!title) { errorEl.textContent = "Введите название теста"; return; }

        const blocks = document.querySelectorAll(".question-block");
        if (blocks.length === 0) { errorEl.textContent = "Добавьте хотя бы один вопрос"; return; }

        const questions = [];
        let orderIndex = 1;

        for (const block of blocks) {
            const qIndex = block.id.split("_")[1];
            const questionText = block.querySelector(".q-text").value.trim();
            if (!questionText) { errorEl.textContent = "Заполните текст всех вопросов"; return; }

            const correctRadio = block.querySelector(`input[name="correct_${qIndex}"]:checked`);
            if (!correctRadio) { errorEl.textContent = `Выберите правильный ответ для вопроса ${qIndex}`; return; }
            const correctLabel = correctRadio.value;

            const answers = [];
            for (const input of block.querySelectorAll(".a-text")) {
                const text = input.value.trim();
                if (!text) { errorEl.textContent = "Заполните все варианты ответа"; return; }
                answers.push({ label: input.dataset.label, answerText: text, correct: input.dataset.label === correctLabel });
            }

            questions.push({ questionText, orderIndex: orderIndex++, answers });
        }

        const result = await apiPost("/tests", { title, description, questions });
        if (!result.ok) { errorEl.textContent = "Ошибка: " + result.text; return; }

        document.getElementById("testTitle").value = "";
        document.getElementById("testDescription").value = "";
        document.getElementById("questions").innerHTML = "";
        questionCount = 0;
        addQuestion();

        loadTests();
        loadFormOptions();
    }

    // ===== СПИСОК ТЕСТОВ =====

    async function loadTests() {
        try {
            const tests = await apiGet("/tests");
            const box = document.getElementById("testsList");

            if (tests.length === 0) { box.className = "empty-state"; box.textContent = "Тестов пока нет"; return; }

            box.className = "";
            box.innerHTML = tests.map(t => `
            <div class="row">
                <div>
                    <div><b>${escapeHtml(t.title)}</b></div>
                    <div class="muted">${escapeHtml(t.description || "Без описания")}</div>
                </div>
                <button class="danger" onclick="deleteTest(${t.id})">Удалить</button>
            </div>`).join("");
        } catch (err) {
            document.getElementById("testsList").textContent = "Ошибка: " + err.message;
        }
    }

    async function deleteTest(id) {
        if (!confirm("Удалить тест? Связанные задания тоже будут затронуты.")) return;
        const result = await apiDelete(`/tests/${id}`);
        if (!result.ok) { alert("Не удалось удалить тест"); return; }
        loadTests();
        loadFormOptions();
    }

    // ===== ОПЦИИ ДЛЯ ФОРМ =====

    async function loadFormOptions() {
        // Загружаем студентов и тесты независимо — ошибка одного не блокирует другого
        try {
            const students = await apiGet("/users/students");
            document.getElementById("assignStudent").innerHTML = students.length
                ? students.map(s => `<option value="${s.id}">${escapeHtml(s.fullName)} (${escapeHtml(s.email)})</option>`).join("")
                : `<option value="">Нет студентов — создайте их в панели администратора</option>`;
        } catch (err) {
            document.getElementById("assignStudent").innerHTML = `<option value="">Ошибка загрузки: ${err.message}</option>`;
        }

        try {
            const tests = await apiGet("/tests");
            const testOptions = tests.map(t => `<option value="${t.id}">${escapeHtml(t.title)}</option>`).join("");
            document.getElementById("assignTest").innerHTML = `<option value="">Без теста</option>` + testOptions;
            document.getElementById("statsTest").innerHTML = `<option value="">Выберите тест</option>` + testOptions;
        } catch (err) {
            document.getElementById("assignTest").innerHTML = `<option value="">Ошибка загрузки тестов: ${err.message}</option>`;
        }

        const deadline = new Date(Date.now() + 7 * 24 * 60 * 60 * 1000);
        deadline.setMinutes(deadline.getMinutes() - deadline.getTimezoneOffset());
        document.getElementById("assignDeadline").value = deadline.toISOString().slice(0, 16);
    }

    // ===== СОЗДАНИЕ ЗАДАНИЯ =====

    async function createAssignment() {
        const title = document.getElementById("assignTitle").value.trim();
        const description = document.getElementById("assignDescription").value.trim();
        const studentId = document.getElementById("assignStudent").value;
        const testId = document.getElementById("assignTest").value;
        const deadline = document.getElementById("assignDeadline").value;
        const errorEl = document.getElementById("assignError");
        errorEl.textContent = "";

        if (!title || !studentId || !deadline) { errorEl.textContent = "Заполните название, студента и срок"; return; }

        const result = await apiPost("/assignments", {
            title, description,
            studentId: Number(studentId),
            testId: testId ? Number(testId) : null,
            deadline: deadline + ":00"
        });

        if (!result.ok) { errorEl.textContent = "Ошибка: " + result.text; return; }

        document.getElementById("assignTitle").value = "";
        document.getElementById("assignDescription").value = "";
        loadAssignments();
    }

    // ===== СПИСОК ЗАДАНИЙ =====

    async function loadAssignments() {
        try {
            const assignments = await apiGet("/assignments");
            const box = document.getElementById("assignmentsList");

            if (assignments.length === 0) { box.className = "empty-state"; box.textContent = "Заданий пока нет"; return; }

            box.className = "";
            box.innerHTML = assignments.map(a => `
            <div class="row">
                <div>
                    <div><b>${escapeHtml(a.title)}</b> → ${escapeHtml(a.studentName)}</div>
                    <div class="muted">${escapeHtml(a.testTitle || "без теста")} · до ${formatDate(a.deadline)}</div>
                </div>
                <div>
                    <span class="badge ${a.status === "COMPLETED" ? "success" : "pending"}">
                        ${a.status === "COMPLETED" ? "Выполнено" : "В процессе"}
                    </span>
                    <button class="danger" onclick="deleteAssignment(${a.id})">Удалить</button>
                </div>
            </div>`).join("");
        } catch (err) {
            document.getElementById("assignmentsList").textContent = "Ошибка: " + err.message;
        }
    }

    async function deleteAssignment(id) {
        if (!confirm("Удалить задание?")) return;
        const result = await apiDelete(`/assignments/${id}`);
        if (!result.ok) { alert("Не удалось удалить задание"); return; }
        loadAssignments();
    }

    // ===== СТАТИСТИКА =====

    async function loadStatistics() {
        const testId = document.getElementById("statsTest").value;
        const box = document.getElementById("statsResult");

        if (!testId) { box.innerHTML = ""; return; }

        try {
            const results = await apiGet(`/statistics/test/${testId}`);

            if (results.length === 0) { box.innerHTML = `<p class="empty-state">Пока никто не сдавал этот тест</p>`; return; }

            box.innerHTML = `
            <table>
                <thead><tr><th>Студент</th><th>Балл</th><th>Неправильных</th><th>Дата</th></tr></thead>
                <tbody>
                    ${results.map(r => `
                        <tr>
                            <td>${escapeHtml(r.studentName)}</td>
                            <td>${r.score} / ${r.totalPoints}</td>
                            <td>${r.incorrectCount}</td>
                            <td>${formatDate(r.completedAt)}</td>
                        </tr>`).join("")}
                </tbody>
            </table>`;
        } catch (err) {
            box.textContent = "Ошибка: " + err.message;
        }
    }
</script>
</body>
</html>
